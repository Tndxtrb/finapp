services:
  - type: web
    name: finapp
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /var/data/finance.db
    disk:
      name: finapp-data
      mountPath: /var/data
      sizeGB: 1
